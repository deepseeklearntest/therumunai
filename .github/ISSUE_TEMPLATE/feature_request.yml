name: "✨ Feature request"
description: Suggest an idea or improvement for Therumunai.
title: "feat: <short description>"
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! For larger or architectural changes, please open this issue
        for discussion **before** writing code — see
        [GOVERNANCE.md](../blob/main/GOVERNANCE.md).
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does this solve? Who benefits?
      placeholder: Citizens can't filter the map by date, so old reports clutter the view…
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about.
    validations:
      required: false
  - type: checkboxes
    id: alignment
    attributes:
      label: Alignment
      options:
        - label: This keeps reporting anonymous (no login / no PII).
          required: true
        - label: Any new user-facing copy can be provided in English and Tamil.
          required: false
