name: ci

# Runs on every PR and on pushes to main. Today it validates docs; the application
# build/test steps are guarded to no-op until package.json exists, then activate
# automatically. Keep the job name "ci" stable — it's a required status check
# (see docs/BRANCH_PROTECTION.md).

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "**/*.md"

      - name: Check Markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: "yes"
          use-verbose-mode: "yes"
          config-file: ".github/markdown-link-check.json"

      - name: Detect application package
        id: detect
        run: |
          if [ -f package.json ]; then
            echo "has_node=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_node=false" >> "$GITHUB_OUTPUT"
            echo "No package.json yet — skipping lint/typecheck/test/build (foundation phase)."
          fi

      - name: Setup Node
        if: steps.detect.outputs.has_node == 'true'
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        if: steps.detect.outputs.has_node == 'true'
        run: npm ci

      # These activate automatically once the corresponding scripts exist in package.json.
      - name: Lint
        if: steps.detect.outputs.has_node == 'true'
        run: npm run --if-present lint

      - name: Typecheck
        if: steps.detect.outputs.has_node == 'true'
        run: npm run --if-present typecheck

      - name: Test
        if: steps.detect.outputs.has_node == 'true'
        run: npm run --if-present test

      - name: Build
        if: steps.detect.outputs.has_node == 'true'
        run: npm run --if-present build
