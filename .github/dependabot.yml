version: 2
updates:
  # Keep GitHub Actions pinned versions fresh.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
    labels:
      - dependencies
      - github-actions

  # npm — activates once package.json files exist (root + app workspaces).
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
    labels:
      - dependencies
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  # Terraform example under deploy/ — keep provider/module references current.
  - package-ecosystem: terraform
    directory: "/deploy"
    schedule:
      interval: monthly
    commit-message:
      prefix: chore
    labels:
      - dependencies
      - terraform
